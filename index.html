<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FantaManager</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--verde:#00ff87;--nero:#0a0a0a;--grigio-scuro:#111111;--grigio:#1a1a1a;--grigio-medio:#2a2a2a;--grigio-chiaro:#3a3a3a;--testo:#e8e8e8;--testo-dim:#888;--oro:#ffd700;--argento:#c0c0c0;--rosso:#ff4444;--blu:#4488ff;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--nero);color:var(--testo);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}

/* HOME */
#home{position:fixed;inset:0;background:var(--nero);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;}
#home.hide{animation:fadeOut 0.6s forwards;}
@keyframes fadeOut{to{opacity:0;pointer-events:none;}}
.home-bg{position:absolute;inset:0;overflow:hidden;}
.home-bg-circle{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.15;}
.home-bg-circle:nth-child(1){width:600px;height:600px;background:var(--verde);top:-200px;left:-200px;animation:float1 8s ease-in-out infinite;}
.home-bg-circle:nth-child(2){width:400px;height:400px;background:var(--blu);bottom:-100px;right:-100px;animation:float2 10s ease-in-out infinite;}
.home-bg-circle:nth-child(3){width:300px;height:300px;background:var(--oro);top:50%;left:60%;animation:float3 7s ease-in-out infinite;}
@keyframes float1{0%,100%{transform:translate(0,0);}50%{transform:translate(30px,20px);}}
@keyframes float2{0%,100%{transform:translate(0,0);}50%{transform:translate(-20px,-30px);}}
@keyframes float3{0%,100%{transform:translate(0,0);}50%{transform:translate(20px,-20px);}}
.home-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,255,135,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,135,0.03) 1px,transparent 1px);background-size:40px 40px;}
.home-content{position:relative;z-index:1;text-align:center;padding:20px;}
.home-badge{display:inline-block;background:rgba(0,255,135,0.1);border:1px solid rgba(0,255,135,0.3);border-radius:20px;padding:6px 16px;font-size:12px;letter-spacing:2px;color:var(--verde);text-transform:uppercase;margin-bottom:24px;animation:fadeUp 0.8s 0.2s both;}
.home-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(60px,15vw,120px);letter-spacing:4px;line-height:0.9;margin-bottom:8px;animation:fadeUp 0.8s 0.4s both;}
.home-title .fanta{color:var(--testo);}
.home-title .manager{color:var(--verde);text-shadow:0 0 40px rgba(0,255,135,0.4);}
.home-sub{font-size:clamp(14px,2vw,18px);color:var(--testo-dim);margin-bottom:48px;letter-spacing:1px;animation:fadeUp 0.8s 0.6s both;}
.home-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:700px;margin:0 auto 40px;animation:fadeUp 0.8s 0.8s both;}
@media(max-width:500px){.home-cards{grid-template-columns:repeat(2,1fr);}}
.home-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:20px 14px;cursor:pointer;transition:all 0.3s;text-align:center;}
.home-card:hover{background:rgba(0,255,135,0.08);border-color:rgba(0,255,135,0.3);transform:translateY(-4px);}
.home-card-icon{font-size:32px;margin-bottom:10px;}
.home-card-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--testo);margin-bottom:4px;}
.home-card-sub{font-size:11px;color:var(--testo-dim);}
.home-enter{display:inline-flex;align-items:center;gap:10px;background:var(--verde);color:var(--nero);font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;padding:14px 36px;border-radius:12px;cursor:pointer;border:none;transition:all 0.3s;animation:fadeUp 0.8s 1s both;}
.home-enter:hover{transform:scale(1.05);box-shadow:0 8px 30px rgba(0,255,135,0.3);}
.home-stats{display:flex;gap:32px;justify-content:center;margin-top:32px;animation:fadeUp 0.8s 1.2s both;}
.home-stat-val{font-family:'Space Mono',monospace;font-size:24px;font-weight:700;color:var(--verde);}
.home-stat-label{font-size:11px;color:var(--testo-dim);margin-top:2px;letter-spacing:1px;text-transform:uppercase;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

/* APP */
#app{display:none;}
#app.show{display:block;}
.header{background:var(--grigio-scuro);border-bottom:2px solid var(--verde);padding:0 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:12px;height:56px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--verde);letter-spacing:2px;white-space:nowrap;cursor:pointer;}
.logo span{color:var(--testo);}
.nav{display:flex;gap:4px;flex:1;overflow-x:auto;scrollbar-width:none;}
.nav::-webkit-scrollbar{display:none;}
.nav-btn{background:none;border:none;color:var(--testo-dim);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:6px 10px;border-radius:6px;cursor:pointer;white-space:nowrap;transition:all 0.2s;}
.nav-btn:hover{background:var(--grigio-medio);color:var(--testo);}
.nav-btn.active{background:var(--verde);color:var(--nero);font-weight:700;}
.admin-btn{background:var(--grigio-medio);border:1px solid var(--grigio-chiaro);color:var(--oro);font-family:'Space Mono',monospace;font-size:11px;padding:6px 10px;border-radius:6px;cursor:pointer;white-space:nowrap;transition:all 0.2s;flex-shrink:0;}
.admin-btn:hover{border-color:var(--oro);}
.main{padding:20px 16px;max-width:1400px;margin:0 auto;}
.section{display:none;}
.section.active{display:block;}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--verde);letter-spacing:3px;margin-bottom:2px;}
.page-sub{color:var(--testo-dim);font-size:13px;margin-bottom:20px;}
.controls{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.search-box{background:var(--grigio);border:1px solid var(--grigio-chiaro);border-radius:8px;padding:9px 14px;color:var(--testo);font-family:'DM Sans',sans-serif;font-size:14px;flex:1;min-width:180px;outline:none;transition:border-color 0.2s;}
.search-box:focus{border-color:var(--verde);}
.search-box::placeholder{color:var(--testo-dim);}

/* SQUADRE */
.squadre-overview{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;}
.squadra-overview-card{background:var(--grigio);border:1px solid var(--grigio-chiaro);border-radius:14px;overflow:hidden;cursor:pointer;transition:all 0.3s;}
.squadra-overview-card:hover{border-color:var(--verde);transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,255,135,0.1);}
.soc-logo{height:110px;display:flex;align-items:center;justify-content:center;}
.soc-logo-placeholder{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--nero);}
.soc-info{padding:12px 14px;}
.soc-nome{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;margin-bottom:3px;}
.soc-owner{font-size:11px;color:var(--testo-dim);margin-bottom:8px;}
.soc-stats{display:flex;gap:10px;flex-wrap:wrap;}
.soc-stat{font-size:10px;color:var(--testo-dim);}
.soc-stat span{color:var(--verde);font-weight:600;font-family:'Space Mono',monospace;}

/* PAGINA SQUADRA */
.back-btn{display:inline-flex;align-items:center;gap:6px;background:var(--grigio);border:1px solid var(--grigio-chiaro);color:var(--testo-dim);font-size:13px;padding:8px 14px;border-radius:8px;cursor:pointer;margin-bottom:20px;transition:all 0.2s;}
.back-btn:hover{border-color:var(--verde);color:var(--verde);}
.squadra-hero{background:var(--grigio);border:1px solid var(--grigio-chiaro);border-radius:14px;overflow:hidden;margin-bottom:20px;}
.squadra-hero-banner{height:150px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.squadra-hero-logo{width:90px;height:90px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:38px;color:var(--nero);border:3px solid rgba(255,255,255,0.2);z-index:1;}
.squadra-hero-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.3);}
.squadra-hero-body{padding:18px 20px;}
.squadra-hero-nome{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;margin-bottom:4px;}
.squadra-hero-all{font-size:13px;color:var(--testo-dim);margin-bottom:16px;}
.squadra-hero-all span{color:var(--oro);font-weight:600;}
.presidenti-title{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--testo-dim);margin-bottom:10px;}
.presidenti-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.presidente-card{display:flex;align-items:center;gap:10px;background:var(--grigio-scuro);border-radius:10px;padding:10px 14px;flex:1;min-width:140px;}
.presidente-foto{width:42px;height:42px;border-radius:50%;background:var(--grigio-chiaro);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--testo-dim);flex-shrink:0;overflow:hidden;}
.presidente-foto img{width:100%;height:100%;object-fit:cover;}
.presidente-nome{font-weight:600;font-size:13px;}
.presidente-ruolo{font-size:10px;color:var(--testo-dim);}
.squadra-stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--grigio-chiaro);border-top:1px solid var(--grigio-chiaro);}
.squadra-stat-item{background:var(--grigio-scuro);padding:10px;text-align:center;}
.squadra-stat-label{font-size:10px;color:var(--testo-dim);text-transform:uppercase;letter-spacing:0.5px;}
.squadra-stat-val{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;margin-top:2px;}

/* ROSA */
.rosa-container{background:var(--grigio);border:1px solid var(--grigio-chiaro);border-radius:14px;overflow:hidden;}
.rosa-tabs{display:flex;border-bottom:1px solid var(--grigio-chiaro);}
.rosa-tab{flex:1;padding:10px 6px;text-align:center;font-size:11px;font-weight:600;color:var(--testo-dim);cursor:pointer;transition:all 0.2s;letter-spacing:0.5px;text-transform:uppercase;border-bottom:2px solid transparent;margin-bottom:-1px;}
.rosa-tab:hover{color:var(--testo);}
.rosa-tab.active{color:var(--verde);border-bottom-color:var(--verde);}
.rosa-count{display:inline-block;background:var(--grigio-medio);border-radius:10px;padding:1px 5px;font-size:10px;margin-left:3px;color:var(--testo-dim);}
.rosa-tab.active .rosa-count{background:rgba(0,255,135,0.15);color:var(--verde);}
.legenda{display:flex;gap:10px;flex-wrap:wrap;padding:10px 16px;background:var(--grigio-scuro);border-bottom:1px solid var(--grigio-chiaro);}
.leg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--testo-dim);}
.giocatori-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px;padding:12px;}
.giocatore-card{background:var(--grigio-scuro);border:1px solid var(--grigio-chiaro);border-radius:10px;padding:11px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:10px;}
.giocatore-card:hover{border-color:var(--verde);background:var(--grigio-medio);}
.gc-avatar{width:34px;height:34px;border-radius:50%;background:var(--grigio-chiaro);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--testo-dim);flex-shrink:0;overflow:hidden;}
.gc-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.gc-info{flex:1;min-width:0;}
.gc-nome{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gc-sub{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap;}
.gc-maglia{font-family:'Space Mono',monospace;font-size:9px;color:var(--testo-dim);}
.g-badge{font-size:9px;font-weight:700;padding:1px 4px;border-radius:3px;letter-spacing:0.5px;}
.badge-c{background:rgba(255,215,0,0.15);color:var(--oro);}
.badge-v{background:rgba(192,192,192,0.15);color:var(--argento);}
.badge-p{background:rgba(68,136,255,0.15);color:var(--blu);}
.badge-prom{background:rgba(0,255,135,0.15);color:var(--verde);}
.g-ruolo{font-size:9px;padding:1px 4px;border-radius:3px;font-weight:700;}
.ruolo-p{background:rgba(255,68,68,0.15);color:var(--rosso);}
.ruolo-d{background:rgba(68,136,255,0.15);color:var(--blu);}
.ruolo-c{background:rgba(255,215,0,0.15);color:var(--oro);}
.ruolo-a{background:rgba(0,255,135,0.15);color:var(--verde);}
.empty{text-align:center;padding:30px;color:var(--testo-dim);font-size:13px;}

/* TIFOSI */
.tifosi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
.tifosi-card{background:var(--grigio);border:1px solid var(--grigio-chiaro);border-radius:12px;overflow:hidden;transition:all 0.2s;cursor:pointer;}
.tifosi-card:hover{border-color:var(--blu);transform:translateY(-1px);}
.tifosi-card-header{background:var(--grigio-scuro);padding:12px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--grigio-chiaro);}
.tifosi-rank{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:16px;flex-shrink:0;}
.rank-1{background:rgba(255,215,0,0.2);color:var(--oro);}
.rank-2{background:rgba(192,192,192,0.2);color:var(--argento);}
.rank-3{background:rgba(205,127,50,0.2);color:#cd7f32;}
.rank-other{background:var(--grigio-medio);color:var(--testo-dim);}
.tifosi-sq-nome{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;flex:1;}
.tifosi-numero{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;color:var(--blu);}
.tifosi-card-body{padding:10px 14px;}
.tifosi-bar-wrap{background:var(--grigio-medio);border-radius:4px;height:5px;margin-bottom:8px;overflow:hidden;}
.tifosi-bar{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--blu),var(--verde));}
.tifosi-last{font-size:11px;color:var(--testo-dim);}
.tifosi-last span{color:var(--verde);font-weight:600;}
.tifosi-card-footer{padding:8px 14px;border-top:1px solid var(--grigio-chiaro);display:flex;justify-content:space-between;font-size:11px;color:var(--testo-dim);}
.log-item{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--grigio-chiaro);}
.log-item:last-child{border-bottom:none;}
.log-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.log-icon.pos{background:rgba(0,255,135,0.1);}
.log-icon.neg{background:rgba(255,68,68,0.1);}
.log-info{flex:1;}
.log-motivo{font-size:13px;font-weight:500;}
.log-data{font-size:11px;color:var(--testo-dim);margin-top:2px;}
.log-val{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;}
.log-val.pos{color:var(--verde);}
.log-val.neg{color:var(--rosso);}

/* COMPETIZIONI */
.comp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.comp-card{background:var(--grigio);border:1px solid var(--grigio-chiaro);border-radius:12px;overflow:hidden;transition:all 0.2s;}
.comp-card:hover{border-color:var(--oro);transform:translateY(-1px);}
.comp-header{padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--grigio-chiaro);}
.comp-icon{font-size:28px;flex-shrink:0;}
.comp-nome{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;flex:1;}
.comp-tipo{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;letter-spacing:0.5px;}
.tipo-campionato{background:rgba(0,255,135,0.15);color:var(--verde);}
.tipo-coppa{background:rgba(255,215,0,0.15);color:var(--oro);}
.tipo-speciale{background:rgba(68,136,255,0.15);color:var(--blu);}
.comp-body{padding:12px 16px;}
.comp-premio-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--grigio-chiaro);font-size:12px;}
.comp-premio-row:last-child{border-bottom:none;}
.comp-premio-label{color:var(--testo-dim);}
.comp-premio-val{font-weight:700;font-family:'Space Mono',monospace;font-size:11px;}
.comp-premio-val.euro{color:var(--oro);}
.comp-museo{background:var(--grigio-scuro);border-radius:8px;padding:8px 12px;display:flex;justify-content:space-between;font-size:12px;margin-top:8px;}
.comp-museo-label{color:var(--testo-dim);}
.comp-museo-val{color:var(--verde);font-family:'Space Mono',monospace;font-weight:700;}

/* MUSEO */
.museo-intro{background:var(--grigio);border:1px solid var(--grigio-chiaro);border-radius:12px;padding:20px;margin-bottom:20px;}
.museo-intro-title{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--oro);letter-spacing:2px;margin-bottom:8px;}
.museo-intro-text{font-size:13px;color:var(--testo-dim);line-height:1.6;}
.moltiplicatori{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
.molt-item{background:var(--grigio-scuro);border:1px solid var(--grigio-chiaro);border-radius:8px;padding:8px 12px;text-align:center;}
.molt-num{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--oro);}
.molt-label{font-size:10px;color:var(--testo-dim);}
.museo-squadre{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
.museo-card{background:var(--grigio);border:1px solid var(--grigio-chiaro);border-radius:12px;overflow:hidden;cursor:pointer;transition:all 0.2s;}
.museo-card:hover{border-color:var(--oro);transform:translateY(-1px);}
.museo-card-header{background:var(--grigio-scuro);padding:12px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--grigio-chiaro);}
.museo-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--nero);flex-shrink:0;}
.museo-sq-nome{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;flex:1;}
.museo-trofei-count{font-family:'Space Mono',monospace;font-size:13px;color:var(--oro);}
.museo-card-body{padding:12px 14px;}
.trofei-list{display:flex;flex-wrap:wrap;gap:6px;}
.trofeo-badge{background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.3);border-radius:6px;padding:4px 8px;font-size:11px;color:var(--oro);}
.museo-rendita{background:var(--grigio-scuro);border-radius:8px;padding:8px 12px;margin-top:10px;display:flex;justify-content:space-between;font-size:12px;}
.museo-rendita-label{color:var(--testo-dim);}
.museo-rendita-val{color:var(--verde);font-family:'Space Mono',monospace;font-weight:700;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:300;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--grigio);border:1px solid var(--grigio-chiaro);border-radius:14px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;scrollbar-width:thin;}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--grigio-chiaro);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--grigio);z-index:1;}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--verde);letter-spacing:2px;}
.modal-close{background:none;border:none;color:var(--testo-dim);font-size:24px;cursor:pointer;line-height:1;padding:4px;}
.modal-close:hover{color:var(--testo);}

/* SCHEDA GIOCATORE */
.player-hero{background:linear-gradient(135deg,var(--grigio-scuro),var(--grigio-medio));padding:22px 20px;display:flex;gap:16px;align-items:center;border-bottom:1px solid var(--grigio-chiaro);}
.player-photo{width:80px;height:80px;border-radius:12px;background:var(--grigio-chiaro);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--testo-dim);flex-shrink:0;overflow:hidden;border:2px solid var(--grigio-chiaro);}
.player-photo img{width:100%;height:100%;object-fit:cover;}

  <!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FantaManager</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--verde:#00ff87;--nero:#0a0a0a;--grigio-scuro:#111111;--grigio:#1a1a1a;--grigio-medio:#2a2a2a;--grigio-chiaro:#3a3a3a;--testo:#e8e8e8;--testo-dim:#888;--oro:#ffd700;--argento:#c0c0c0;--rosso:#ff4444;--blu:#4488ff;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--nero);color:var(--testo);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}

/* HOME */
#home{position:fixed;inset:0;background:var(--nero);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;}
#home.hide{animation:fadeOut 0.6s forwards;}
@keyframes fadeOut{to{opacity:0;pointer-events:none;}}
.home-bg{position:absolute;inset:0;overflow:hidden;}
.home-bg-circle{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.15;}
.home-bg-circle:nth-child(1){width:600px;height:600px;background:var(--verde);top:-200px;left:-200px;animation:float1 8s ease-in-out infinite;}
.home-bg-circle:nth-child(2){width:400px;height:400px;background:var(--blu);bottom:-100px;right:-100px;animation:float2 10s ease-in-out infinite;}
.home-bg-circle:nth-child(3){width:300px;height:300px;background:var(--oro);top:50%;left:60%;animation:float3 7s ease-in-out infinite;}
@keyframes float1{0%,100%{transform:translate(0,0);}50%{transform:translate(30px,20px);}}
@keyframes float2{0%,100%{transform:translate(0,0);}50%{transform:translate(-20px,-30px);}}
@keyframes float3{0%,100%{transform:translate(0,0);}50%{transform:translate(20px,-20px);}}
.home-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,255,135,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,135,0.03) 1px,transparent 1px);background-size:40px 40px;}
.home-content{position:relative;z-index:1;text-align:center;padding:20px;}
.home-badge{display:inline-block;background:rgba(0,255,135,0.1);border:1px solid rgba(0,255,135,0.3);border-radius:20px;padding:6px 16px;font-size:12px;letter-spacing:2px;color:var(--verde);text-transform:uppercase;margin-bottom:24px;animation:fadeUp 0.8s 0.2s both;}
.home-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(60px,15vw,120px);letter-spacing:4px;line-height:0.9;margin-bottom:8px;animation:fadeUp 0.8s 0.4s both;}
.home-title .fanta{color:var(--testo);}
.home-title .manager{color:var(--verde);text-shadow:0 0 40px rgba(0,255,135,0.4);}
.home-sub{font-size:clamp(14px,2vw,18px);color:var(--testo-dim);margin-bottom:48px;letter-spacing:1px;animation:fadeUp 0.8s 0.6s both;}
.home-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:700px;margin:0 auto 40px;animation:fadeUp 0.8s 0.8s both;}
@media(max-width:500px){.home-cards{grid-template-columns:repeat(2,1fr);}}
.home-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:20px 14px;cursor:pointer;transition:all 0.3s;text-align:center;}
.home-card:hover{background:rgba(0,255,135,0.08);border-color:rgba(0,255,135,0.3);transform:translateY(-4px);}
.home-card-icon{font-size:32px;margin-bottom:10px;}
.home-card-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--testo);margin-bottom:4px;}
.home-card-sub{font-size:11px;color:var(--testo-dim);}
.home-enter{display:inline-flex;align-items:center;gap:10px;background:var(--verde);color:var(--nero);font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;padding:14px 36px;border-radius:12px;cursor:pointer;border:none;transition:all 0.3s;animation:fadeUp 0.8s 1s both;}
.home-enter:hover{transform:scale(1.05);box-shadow:0 8px 30px rgba(0,255,135,0.3);}
.home-stats{display:flex;gap:32px;justify-content:center;margin-top:32px;animation:fadeUp 0.8s 1.2s both;}
.home-stat-val{font-family:'Space Mono',monospace;font-size:24px;font-weight:700;color:var(--verde);}
.home-stat-label{font-size:11px;color:var(--testo-dim);margin-top:2px;letter-spacing:1px;text-transform:uppercase;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

/* APP */
#app{display:none;}
#app.show{display:block;}
.header{background:var(--grigio-scuro);border-bottom:2px solid var(--verde);padding:0 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:12px;height:56px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--verde);letter-spacing:2px;white-space:nowrap;cursor:pointer;}
.logo span{color:var(--testo);}
.nav{display:flex;gap:4px;flex:1;overflow-x:auto;scrollbar-width:none;}
.nav::-webkit-scrollbar{display:none;}
.nav-btn{background:none;border:none;color:var(--testo-dim);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:6px 10px;border-radius:6px;cursor:pointer;white-space:nowrap;transition:all 0.2s;}
.nav-btn:hover{background:var(--grigio-medio);color:var(--testo);}
.nav-btn.active{background:var(--verde);color:var(--nero);font-weight:700;}
.admin-btn{background:var(--grigio-medio);border:1px solid var(--grigio-chiaro);color:var(--oro);font-family:'Space Mono',monospace;font-size:11px;padding:6px 10px;border-radius:6px;cursor:pointer;white-space:nowrap;transition:all 0.2s;flex-shrink:0;}
.admin-btn:hover{border-color:var(--oro);}
.main{padding:20px 16px;max-width:1400px;margin:0 auto;}
.section{display:none;}
.section.active{display:block;}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--verde);letter-spacing:3px;margin-bottom:2px;}
.page-sub{color:var(--testo-dim);font-size:13px;margin-bottom:20px;}
.controls{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.search-box{background:var(--grigio);border:1px solid var(--grigio-chiaro);border-radius:8px;padding:9px 14px;color:var(--testo);font-family:'DM Sans',sans-serif;font-size:14px;flex:1;min-width:180px;outline:none;transition:border-color 0.2s;}
.search-box:focus{border-color:var(--verde);}
.search-box::placeholder{color:var(--testo-dim);}

/* SQUADRE */
.squadre-overview{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;}
.squadra-overview-card{background:var(--grigio);border:1px solid var(--grigio-chiaro);border-radius:14px;overflow:hidden;cursor:pointer;transition:all 0.3s;}
.squadra-overview-card:hover{border-color:var(--verde);transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,255,135,0.1);}
.soc-logo{height:110px;display:flex;align-items:center;justify-content:center;}
.soc-logo-placeholder{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--nero);}
.soc-info{padding:12px 14px;}
.soc-nome{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;margin-bottom:3px;}
.soc-owner{font-size:11px;color:var(--testo-dim);margin-bottom:8px;}
.soc-stats{display:flex;gap:10px;flex-wrap:wrap;}
.soc-stat{font-size:10px;color:var(--testo-dim);}
.soc-stat span{color:var(--verde);font-weight:600;font-family:'Space Mono',monospace;}

/* PAGINA SQUADRA */
.back-btn{display:inline-flex;align-items:center;gap:6px;background:var(--grigio);border:1px solid var(--grigio-chiaro);color:var(--testo-dim);font-size:13px;padding:8px 14px;border-radius:8px;cursor:pointer;margin-bottom:20px;transition:all 0.2s;}
.back-btn:hover{border-color:var(--verde);color:var(--verde);}
.squadra-hero{background:var(--grigio);border:1px solid var(--grigio-chiaro);border-radius:14px;overflow:hidden;margin-bottom:20px;}
.squadra-hero-banner{height:150px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.squadra-hero-logo{width:90px;height:90px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:38px;color:var(--nero);border:3px solid rgba(255,255,255,0.2);z-index:1;}
.squadra-hero-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.3);}
.squadra-hero-body{padding:18px 20px;}
.squadra-hero-nome{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;margin-bottom:4px;}
.squadra-hero-all{font-size:13px;color:var(--testo-dim);margin-bottom:16px;}
.squadra-hero-all span{color:var(--oro);font-weight:600;}
.presidenti-title{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--testo-dim);margin-bottom:10px;}
.presidenti-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.presidente-card{display:flex;align-items:center;gap:10px;background:var(--grigio-scuro);border-radius:10px;padding:10px 14px;flex:1;min-width:140px;}
.presidente-foto{width:42px;height:42px;border-radius:50%;background:var(--grigio-chiaro);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--testo-dim);flex-shrink:0;overflow:hidden;}
.presidente-foto img{width:100%;height:100%;object-fit:cover;}
.presidente-nome{font-weight:600;font-size:13px;}
.presidente-ruolo{font-size:10px;color:var(--testo-dim);}
.squadra-stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--grigio-chiaro);border-top:1px solid var(--grigio-chiaro);}
.squadra-stat-item{background:var(--grigio-scuro);padding:10px;text-align:center;}
.squadra-stat-label{font-size:10px;color:var(--testo-dim);text-transform:uppercase;letter-spacing:0.5px;}
.squadra-stat-val{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;margin-top:2px;}

/* ROSA */
.rosa-container{background:var(--grigio);border:1px solid var(--grigio-chiaro);border-radius:14px;overflow:hidden;}
.rosa-tabs{display:flex;border-bottom:1px solid var(--grigio-chiaro);}
.rosa-tab{flex:1;padding:10px 6px;text-align:center;font-size:11px;font-weight:600;color:var(--testo-dim);cursor:pointer;transition:all 0.2s;letter-spacing:0.5px;text-transform:uppercase;border-bottom:2px solid transparent;margin-bottom:-1px;}
.rosa-tab:hover{color:var(--testo);}
.rosa-tab.active{color:var(--verde);border-bottom-color:var(--verde);}
.rosa-count{display:inline-block;background:var(--grigio-medio);border-radius:10px;padding:1px 5px;font-size:10px;margin-left:3px;color:var(--testo-dim);}
.rosa-tab.active .rosa-count{background:rgba(0,255,135,0.15);color:var(--verde);}
.legenda{display:flex;gap:10px;flex-wrap:wrap;padding:10px 16px;background:var(--grigio-scuro);border-bottom:1px solid var(--grigio-chiaro);}
.leg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--testo-dim);}
.giocatori-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px;padding:12px;}
.giocatore-card{background:var(--grigio-scuro);border:1px solid var(--grigio-chiaro);border-radius:10px;padding:11px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:10px;}
.giocatore-card:hover{border-color:var(--verde);background:var(--grigio-medio);}
.gc-avatar{width:34px;height:34px;border-radius:50%;background:var(--grigio-chiaro);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--testo-dim);flex-shrink:0;overflow:hidden;}
.gc-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.gc-info{flex:1;min-width:0;}
.gc-nome{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gc-sub{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap;}
.gc-maglia{font-family:'Space Mono',monospace;font-size:9px;color:var(--testo-dim);}
.g-badge{font-size:9px;font-weight:700;padding:1px 4px;border-radius:3px;letter-spacing:0.5px;}
.badge-c{background:rgba(255,215,0,0.15);color:var(--oro);}
.badge-v{background:rgba(192,192,192,0.15);color:var(--argento);}
.badge-p{background:rgba(68,136,255,0.15);color:var(--blu);}
.badge-prom{background:rgba(0,255,135,0.15);color:var(--verde);}
.g-ruolo{font-size:9px;padding:1px 4px;border-radius:3px;font-weight:700;}
.ruolo-p{background:rgba(255,68,68,0.15);color:var(--rosso);}
.ruolo-d{background:rgba(68,136,255,0.15);color:var(--blu);}
.ruolo-c{background:rgba(255,215,0,0.15);color:var(--oro);}
.ruolo-a{background:rgba(0,255,135,0.15);color:var(--verde);}
.empty{text-align:center;padding:30px;color:var(--testo-dim);font-size:13px;}

/* TIFOSI */
.tifosi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
.tifosi-card{background:var(--grigio);border:1px solid var(--grigio-chiaro);border-radius:12px;overflow:hidden;transition:all 0.2s;cursor:pointer;}
.tifosi-card:hover{border-color:var(--blu);transform:translateY(-1px);}
.tifosi-card-header{background:var(--grigio-scuro);padding:12px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--grigio-chiaro);}
.tifosi-rank{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:16px;flex-shrink:0;}
.rank-1{background:rgba(255,215,0,0.2);color:var(--oro);}
.rank-2{background:rgba(192,192,192,0.2);color:var(--argento);}
.rank-3{background:rgba(205,127,50,0.2);color:#cd7f32;}
.rank-other{background:var(--grigio-medio);color:var(--testo-dim);}
.tifosi-sq-nome{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;flex:1;}
.tifosi-numero{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;color:var(--blu);}
.tifosi-card-body{padding:10px 14px;}
.tifosi-bar-wrap{background:var(--grigio-medio);border-radius:4px;height:5px;margin-bottom:8px;overflow:hidden;}
.tifosi-bar{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--blu),var(--verde));}
.tifosi-last{font-size:11px;color:var(--testo-dim);}
.tifosi-last span{color:var(--verde);font-weight:600;}
.tifosi-card-footer{padding:8px 14px;border-top:1px solid var(--grigio-chiaro);display:flex;justify-content:space-between;font-size:11px;color:var(--testo-dim);}
.log-item{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--grigio-chiaro);}
.log-item:last-child{border-bottom:none;}
.log-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.log-icon.pos{background:rgba(0,255,135,0.1);}
.log-icon.neg{background:rgba(255,68,68,0.1);}
.log-info{flex:1;}
.log-motivo{font-size:13px;font-weight:500;}
.log-data{font-size:11px;color:var(--testo-dim);margin-top:2px;}
.log-val{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;}
.log-val.pos{color:var(--verde);}
.log-val.neg{color:var(--rosso);}

/* COMPETIZIONI */
.comp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.comp-card{background:var(--grigio);border:1px solid var(--grigio-chiaro);border-radius:12px;overflow:hidden;transition:all 0.2s;}
.comp-card:hover{border-color:var(--oro);transform:translateY(-1px);}
.comp-header{padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--grigio-chiaro);}
.comp-icon{font-size:28px;flex-shrink:0;}
.comp-nome{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;flex:1;}
.comp-tipo{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;letter-spacing:0.5px;}
.tipo-campionato{background:rgba(0,255,135,0.15);color:var(--verde);}
.tipo-coppa{background:rgba(255,215,0,0.15);color:var(--oro);}
.tipo-speciale{background:rgba(68,136,255,0.15);color:var(--blu);}
.comp-body{padding:12px 16px;}
.comp-premio-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--grigio-chiaro);font-size:12px;}
.comp-premio-row:last-child{border-bottom:none;}
.comp-premio-label{color:var(--testo-dim);}
.comp-premio-val{font-weight:700;font-family:'Space Mono',monospace;font-size:11px;}
.comp-premio-val.euro{color:var(--oro);}
.comp-museo{background:var(--grigio-scuro);border-radius:8px;padding:8px 12px;display:flex;justify-content:space-between;font-size:12px;margin-top:8px;}
.comp-museo-label{color:var(--testo-dim);}
.comp-museo-val{color:var(--verde);font-family:'Space Mono',monospace;font-weight:700;}

/* MUSEO */
.museo-intro{background:var(--grigio);border:1px solid var(--grigio-chiaro);border-radius:12px;padding:20px;margin-bottom:20px;}
.museo-intro-title{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--oro);letter-spacing:2px;margin-bottom:8px;}
.museo-intro-text{font-size:13px;color:var(--testo-dim);line-height:1.6;}
.moltiplicatori{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
.molt-item{background:var(--grigio-scuro);border:1px solid var(--grigio-chiaro);border-radius:8px;padding:8px 12px;text-align:center;}
.molt-num{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--oro);}
.molt-label{font-size:10px;color:var(--testo-dim);}
.museo-squadre{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
.museo-card{background:var(--grigio);border:1px solid var(--grigio-chiaro);border-radius:12px;overflow:hidden;cursor:pointer;transition:all 0.2s;}
.museo-card:hover{border-color:var(--oro);transform:translateY(-1px);}
.museo-card-header{background:var(--grigio-scuro);padding:12px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--grigio-chiaro);}
.museo-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--nero);flex-shrink:0;}
.museo-sq-nome{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;flex:1;}
.museo-trofei-count{font-family:'Space Mono',monospace;font-size:13px;color:var(--oro);}
.museo-card-body{padding:12px 14px;}
.trofei-list{display:flex;flex-wrap:wrap;gap:6px;}
.trofeo-badge{background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.3);border-radius:6px;padding:4px 8px;font-size:11px;color:var(--oro);}
.museo-rendita{background:var(--grigio-scuro);border-radius:8px;padding:8px 12px;margin-top:10px;display:flex;justify-content:space-between;font-size:12px;}
.museo-rendita-label{color:var(--testo-dim);}
.museo-rendita-val{color:var(--verde);font-family:'Space Mono',monospace;font-weight:700;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:300;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--grigio);border:1px solid var(--grigio-chiaro);border-radius:14px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;scrollbar-width:thin;}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--grigio-chiaro);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--grigio);z-index:1;}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--verde);letter-spacing:2px;}
.modal-close{background:none;border:none;color:var(--testo-dim);font-size:24px;cursor:pointer;line-height:1;padding:4px;}
.modal-close:hover{color:var(--testo);}

/* SCHEDA GIOCATORE */
.player-hero{background:linear-gradient(135deg,var(--grigio-scuro),var(--grigio-medio));padding:22px 20px;display:flex;gap:16px;align-items:center;border-bottom:1px solid var(--grigio-chiaro);}
.player-photo{width:80px;height:80px;border-radius:12px;background:var(--grigio-chiaro);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--testo-dim);flex-shrink:0;overflow:hidden;border:2px solid var(--grigio-chiaro);}
.player-photo img{width:100%;height:100%;object-fit:cover;}
.player-nome{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;line-height:1;margin-bottom:6px;}
.player-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;}
